<svg viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="550" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="500" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#333">DevSecOps Security Pipeline</text>

  <!-- Development Phase -->
  <g>
    <rect x="30" y="70" width="200" height="450" fill="#E3F2FD" opacity="0.8" stroke="#2196F3" stroke-width="2" rx="8"/>
    <text x="130" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#2196F3">Development</text>

    <!-- SAST -->
    <rect x="50" y="120" width="160" height="70" fill="#FF6B6B" opacity="0.85" rx="6"/>
    <text x="130" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🔍 SAST</text>
    <text x="130" y="160" font-size="10" text-anchor="middle" fill="white">SonarQube, Checkov</text>
    <text x="130" y="175" font-size="10" text-anchor="middle" fill="white">Snyk Code</text>

    <!-- Dependency Check -->
    <rect x="50" y="210" width="160" height="70" fill="#FF8C42" opacity="0.85" rx="6"/>
    <text x="130" y="230" font-size="14" font-weight="bold" text-anchor="middle" fill="white">📦 Dependencies</text>
    <text x="130" y="250" font-size="10" text-anchor="middle" fill="white">Snyk, OWASP</text>
    <text x="130" y="265" font-size="10" text-anchor="middle" fill="white">Dependency-Check</text>

    <!-- Secrets Scanning -->
    <rect x="50" y="300" width="160" height="70" fill="#D32F2F" opacity="0.85" rx="6"/>
    <text x="130" y="320" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🔐 Secrets</text>
    <text x="130" y="340" font-size="10" text-anchor="middle" fill="white">GitGuardian, TruffleHog</text>
    <text x="130" y="355" font-size="10" text-anchor="middle" fill="white">detect-secrets</text>

    <!-- DAST -->
    <rect x="50" y="390" width="160" height="70" fill="#7B1FA2" opacity="0.85" rx="6"/>
    <text x="130" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="white">⚔️ DAST</text>
    <text x="130" y="430" font-size="10" text-anchor="middle" fill="white">OWASP ZAP, Burp</text>
    <text x="130" y="445" font-size="10" text-anchor="middle" fill="white">Acunetix</text>
  </g>

  <!-- Build Phase -->
  <g>
    <rect x="270" y="70" width="200" height="450" fill="#FFF3E0" opacity="0.8" stroke="#FF9800" stroke-width="2" rx="8"/>
    <text x="370" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF9800">Build & Push</text>

    <!-- Container Scan -->
    <rect x="290" y="120" width="160" height="70" fill="#FF6B6B" opacity="0.85" rx="6"/>
    <text x="370" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🐳 Container</text>
    <text x="370" y="160" font-size="10" text-anchor="middle" fill="white">Trivy, Aqua Sec</text>
    <text x="370" y="175" font-size="10" text-anchor="middle" fill="white">Snyk Container</text>

    <!-- Image Signing -->
    <rect x="290" y="210" width="160" height="70" fill="#FF8C42" opacity="0.85" rx="6"/>
    <text x="370" y="230" font-size="14" font-weight="bold" text-anchor="middle" fill="white">✍️ Sign & Verify</text>
    <text x="370" y="250" font-size="10" text-anchor="middle" fill="white">Cosign, Sigstore</text>
    <text x="370" y="265" font-size="10" text-anchor="middle" fill="white">Notary</text>

    <!-- SBOM Generation -->
    <rect x="290" y="300" width="160" height="70" fill="#D32F2F" opacity="0.85" rx="6"/>
    <text x="370" y="320" font-size="14" font-weight="bold" text-anchor="middle" fill="white">📋 SBOM</text>
    <text x="370" y="340" font-size="10" text-anchor="middle" fill="white">Syft, CycloneDX</text>
    <text x="370" y="355" font-size="10" text-anchor="middle" fill="white">SPDX</text>

    <!-- Registry Scan -->
    <rect x="290" y="390" width="160" height="70" fill="#7B1FA2" opacity="0.85" rx="6"/>
    <text x="370" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="white">📦 Registry</text>
    <text x="370" y="430" font-size="10" text-anchor="middle" fill="white">Harbor, Quay</text>
    <text x="370" y="445" font-size="10" text-anchor="middle" fill="white">Policy Enforcement</text>
  </g>

  <!-- Deploy Phase -->
  <g>
    <rect x="510" y="70" width="200" height="450" fill="#F3E5F5" opacity="0.8" stroke="#9C27B0" stroke-width="2" rx="8"/>
    <text x="610" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#9C27B0">Deployment</text>

    <!-- IaC Scan -->
    <rect x="530" y="120" width="160" height="70" fill="#FF6B6B" opacity="0.85" rx="6"/>
    <text x="610" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🏗️ IaC</text>
    <text x="610" y="160" font-size="10" text-anchor="middle" fill="white">Checkov, TFLint</text>
    <text x="610" y="175" font-size="10" text-anchor="middle" fill="white">CloudFormation</text>

    <!-- Policy as Code -->
    <rect x="530" y="210" width="160" height="70" fill="#FF8C42" opacity="0.85" rx="6"/>
    <text x="610" y="230" font-size="14" font-weight="bold" text-anchor="middle" fill="white">📜 Policy</text>
    <text x="610" y="250" font-size="10" text-anchor="middle" fill="white">OPA/Rego, Kyverno</text>
    <text x="610" y="265" font-size="10" text-anchor="middle" fill="white">RBAC</text>

    <!-- Network Security -->
    <rect x="530" y="300" width="160" height="70" fill="#D32F2F" opacity="0.85" rx="6"/>
    <text x="610" y="320" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🌐 Network</text>
    <text x="610" y="340" font-size="10" text-anchor="middle" fill="white">Cilium, NetworkPolicy</text>
    <text x="610" y="355" font-size="10" text-anchor="middle" fill="white">ServiceMesh</text>

    <!-- Compliance -->
    <rect x="530" y="390" width="160" height="70" fill="#7B1FA2" opacity="0.85" rx="6"/>
    <text x="610" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="white">✅ Compliance</text>
    <text x="610" y="430" font-size="10" text-anchor="middle" fill="white">Audit, Logging</text>
    <text x="610" y="445" font-size="10" text-anchor="middle" fill="white">Monitoring</text>
  </g>

  <!-- Runtime Phase -->
  <g>
    <rect x="750" y="70" width="220" height="450" fill="#E8F5E9" opacity="0.8" stroke="#4CAF50" stroke-width="2" rx="8"/>
    <text x="860" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#4CAF50">Runtime Security</text>

    <!-- Container Runtime -->
    <rect x="770" y="120" width="160" height="70" fill="#FF6B6B" opacity="0.85" rx="6"/>
    <text x="850" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🔒 Container</text>
    <text x="850" y="160" font-size="10" text-anchor="middle" fill="white">Falco, AppArmor</text>
    <text x="850" y="175" font-size="10" text-anchor="middle" fill="white">SELinux</text>

    <!-- Secret Management -->
    <rect x="770" y="210" width="160" height="70" fill="#FF8C42" opacity="0.85" rx="6"/>
    <text x="850" y="230" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🔐 Secrets</text>
    <text x="850" y="250" font-size="10" text-anchor="middle" fill="white">Vault, Infisical</text>
    <text x="850" y="265" font-size="10" text-anchor="middle" fill="white">Sealed Secrets</text>

    <!-- Anomaly Detection -->
    <rect x="770" y="300" width="160" height="70" fill="#D32F2F" opacity="0.85" rx="6"/>
    <text x="850" y="320" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🤖 Anomaly</text>
    <text x="850" y="340" font-size="10" text-anchor="middle" fill="white">Falco, Datadog</text>
    <text x="850" y="355" font-size="10" text-anchor="middle" fill="white">Behavior Analysis</text>

    <!-- Threat Response -->
    <rect x="770" y="390" width="160" height="70" fill="#7B1FA2" opacity="0.85" rx="6"/>
    <text x="850" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="white">🚨 Response</text>
    <text x="850" y="430" font-size="10" text-anchor="middle" fill="white">Incident Response</text>
    <text x="850" y="445" font-size="10" text-anchor="middle" fill="white">Auto-mitigation</text>
  </g>
</svg>