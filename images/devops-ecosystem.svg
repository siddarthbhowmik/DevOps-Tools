<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="500" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#333">DevOps Ecosystem</text>

  <!-- Central circle -->
  <circle cx="500" cy="300" r="80" fill="#4CAF50" opacity="0.9"/>
  <text x="500" y="295" font-size="18" font-weight="bold" text-anchor="middle" fill="white">DevOps</text>
  <text x="500" y="320" font-size="14" text-anchor="middle" fill="white">Stack</text>

  <!-- Categories arranged in a circle -->

  <!-- 1. Source Control (Top Left) -->
  <circle cx="150" cy="100" r="60" fill="#2196F3" opacity="0.85"/>
  <text x="150" y="95" font-size="20" text-anchor="middle" fill="white">🔀</text>
  <text x="150" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Source</text>
  <text x="150" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Control</text>

  <!-- 2. CI/CD (Top) -->
  <circle cx="500" cy="80" r="60" fill="#FF9800" opacity="0.85"/>
  <text x="500" y="75" font-size="20" text-anchor="middle" fill="white">⚡</text>
  <text x="500" y="95" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CI/CD</text>
  <text x="500" y="110" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Pipeline</text>

  <!-- 3. Infrastructure as Code (Top Right) -->
  <circle cx="850" cy="100" r="60" fill="#9C27B0" opacity="0.85"/>
  <text x="850" y="95" font-size="20" text-anchor="middle" fill="white">🏗️</text>
  <text x="850" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Infrastructure</text>
  <text x="850" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">as Code</text>

  <!-- 4. Containers (Right) -->
  <circle cx="920" cy="300" r="60" fill="#00BCD4" opacity="0.85"/>
  <text x="920" y="295" font-size="20" text-anchor="middle" fill="white">📦</text>
  <text x="920" y="315" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Container</text>
  <text x="920" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="white">ization</text>

  <!-- 5. Orchestration (Bottom Right) -->
  <circle cx="850" cy="500" r="60" fill="#F44336" opacity="0.85"/>
  <text x="850" y="495" font-size="20" text-anchor="middle" fill="white">🎛️</text>
  <text x="850" y="515" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Orchestration</text>
  <text x="850" y="530" font-size="12" font-weight="bold" text-anchor="middle" fill="white">K8s/Nomad</text>

  <!-- 6. Monitoring (Bottom) -->
  <circle cx="500" cy="520" r="60" fill="#FFEB3B" opacity="0.85"/>
  <text x="500" y="515" font-size="20" text-anchor="middle" fill="#333">📊</text>
  <text x="500" y="535" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Monitoring &</text>
  <text x="500" y="550" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Observability</text>

  <!-- 7. Security (Bottom Left) -->
  <circle cx="150" cy="500" r="60" fill="#E91E63" opacity="0.85"/>
  <text x="150" y="495" font-size="20" text-anchor="middle" fill="white">🔒</text>
  <text x="150" y="515" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Security &</text>
  <text x="150" y="530" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Compliance</text>

  <!-- 8. Cost Management (Left) -->
  <circle cx="80" cy="300" r="60" fill="#673AB7" opacity="0.85"/>
  <text x="80" y="295" font-size="20" text-anchor="middle" fill="white">💰</text>
  <text x="80" y="315" font-size="12" font-weight="bold" text-anchor="middle" fill="white">FinOps &</text>
  <text x="80" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Cost Mgmt</text>

  <!-- Connection lines from center to each circle -->
  <defs>
    <line id="connector-style" x1="500" y1="300" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5"/>
  </defs>

  <line x1="500" y1="300" x2="150" y2="100" stroke="#999" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="300" x2="500" y2="80" stroke="#999" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="300" x2="850" y2="100" stroke="#999" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="300" x2="920" y2="300" stroke="#999" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="300" x2="850" y2="500" stroke="#999" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="300" x2="500" y2="520" stroke="#999" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="300" x2="150" y2="500" stroke="#999" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="300" x2="80" y2="300" stroke="#999" stroke-width="2" opacity="0.4"/>
</svg>