<svg viewBox="0 0 1200 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="250" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">CI/CD Pipeline Flow</text>

  <!-- Step boxes -->

  <!-- 1. Developer -->
  <rect x="20" y="70" width="100" height="80" fill="#2196F3" rx="8"/>
  <text x="70" y="100" font-size="20" text-anchor="middle" fill="white">👨‍💻</text>
  <text x="70" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Developer</text>

  <!-- Arrow 1 -->
  <path d="M 120 110 L 150 110" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 2. SCM -->
  <rect x="150" y="70" width="100" height="80" fill="#00BCD4" rx="8"/>
  <text x="200" y="100" font-size="20" text-anchor="middle" fill="white">🔀</text>
  <text x="200" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Git Commit</text>

  <!-- Arrow 2 -->
  <path d="M 250 110 L 280 110" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 3. Build -->
  <rect x="280" y="70" width="100" height="80" fill="#FF9800" rx="8"/>
  <text x="330" y="100" font-size="20" text-anchor="middle" fill="white">🔨</text>
  <text x="330" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Build</text>

  <!-- Arrow 3 -->
  <path d="M 380 110 L 410 110" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 4. Test -->
  <rect x="410" y="70" width="100" height="80" fill="#9C27B0" rx="8"/>
  <text x="460" y="100" font-size="20" text-anchor="middle" fill="white">✅</text>
  <text x="460" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Test</text>

  <!-- Arrow 4 -->
  <path d="M 510 110 L 540 110" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 5. Artifact Registry -->
  <rect x="540" y="70" width="100" height="80" fill="#E91E63" rx="8"/>
  <text x="590" y="100" font-size="20" text-anchor="middle" fill="white">📦</text>
  <text x="590" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Registry</text>

  <!-- Arrow 5 -->
  <path d="M 640 110 L 670 110" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 6. Deploy -->
  <rect x="670" y="70" width="100" height="80" fill="#4CAF50" rx="8"/>
  <text x="720" y="100" font-size="20" text-anchor="middle" fill="white">🚀</text>
  <text x="720" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Deploy</text>

  <!-- Arrow 6 -->
  <path d="M 770 110 L 800 110" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 7. Staging -->
  <rect x="800" y="70" width="100" height="80" fill="#673AB7" rx="8"/>
  <text x="850" y="100" font-size="20" text-anchor="middle" fill="white">🧪</text>
  <text x="850" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Staging</text>

  <!-- Arrow 7 -->
  <path d="M 900 110 L 930 110" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 8. Production -->
  <rect x="930" y="70" width="100" height="80" fill="#FF5722" rx="8"/>
  <text x="980" y="100" font-size="20" text-anchor="middle" fill="white">🌐</text>
  <text x="980" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Production</text>

  <!-- Arrow 8 - Feedback loop -->
  <path d="M 980 150 Q 600 200 70 150" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="600" y="220" font-size="12" fill="#666" text-anchor="middle">📊 Monitor & Feedback Loop</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>