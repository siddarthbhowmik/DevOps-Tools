<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="500" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#333">Container & Kubernetes Stack</text>

  <!-- Main Kubernetes box -->
  <rect x="100" y="80" width="800" height="500" fill="none" stroke="#4CAF50" stroke-width="3" rx="10" stroke-dasharray="10,5"/>
  <text x="120" y="100" font-size="16" font-weight="bold" fill="#4CAF50">Kubernetes Cluster</text>

  <!-- Layer 1: Container Runtime -->
  <rect x="120" y="130" width="180" height="100" fill="#2196F3" opacity="0.9" rx="8"/>
  <text x="210" y="150" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🐳</text>
  <text x="210" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Container</text>
  <text x="210" y="195" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Runtime</text>
  <text x="210" y="215" font-size="11" text-anchor="middle" fill="white">Docker, Podman</text>

  <!-- Layer 2: Image Build -->
  <rect x="320" y="130" width="180" height="100" fill="#FF9800" opacity="0.9" rx="8"/>
  <text x="410" y="150" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🔨</text>
  <text x="410" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Image</text>
  <text x="410" y="195" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Build</text>
  <text x="410" y="215" font-size="11" text-anchor="middle" fill="white">Buildah, Kaniko</text>

  <!-- Layer 3: Registry -->
  <rect x="520" y="130" width="180" height="100" fill="#9C27B0" opacity="0.9" rx="8"/>
  <text x="610" y="150" font-size="16" font-weight="bold" text-anchor="middle" fill="white">📦</text>
  <text x="610" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Registry</text>
  <text x="610" y="195" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Storage</text>
  <text x="610" y="215" font-size="11" text-anchor="middle" fill="white">Harbor, Quay</text>

  <!-- Layer 4: Networking -->
  <rect x="720" y="130" width="160" height="100" fill="#00BCD4" opacity="0.9" rx="8"/>
  <text x="800" y="150" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🌐</text>
  <text x="800" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Networking</text>
  <text x="800" y="195" font-size="13" font-weight="bold" text-anchor="middle" fill="white"></text>
  <text x="800" y="215" font-size="11" text-anchor="middle" fill="white">Cilium, Calico</text>

  <!-- Layer 5: Orchestration -->
  <rect x="120" y="260" width="180" height="100" fill="#F44336" opacity="0.9" rx="8"/>
  <text x="210" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🎛️</text>
  <text x="210" y="305" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Orchestration</text>
  <text x="210" y="325" font-size="13" font-weight="bold" text-anchor="middle" fill="white"></text>
  <text x="210" y="345" font-size="11" text-anchor="middle" fill="white">K3S, Rancher</text>

  <!-- Layer 6: Service Mesh -->
  <rect x="320" y="260" width="180" height="100" fill="#E91E63" opacity="0.9" rx="8"/>
  <text x="410" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🕸️</text>
  <text x="410" y="305" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Service</text>
  <text x="410" y="325" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Mesh</text>
  <text x="410" y="345" font-size="11" text-anchor="middle" fill="white">Istio, Linkerd</text>

  <!-- Layer 7: Observability -->
  <rect x="520" y="260" width="180" height="100" fill="#FFEB3B" opacity="0.9" rx="8"/>
  <text x="610" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">📊</text>
  <text x="610" y="305" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Observability</text>
  <text x="610" y="325" font-size="13" font-weight="bold" text-anchor="middle" fill="#333"></text>
  <text x="610" y="345" font-size="11" text-anchor="middle" fill="#333">Prometheus, Loki</text>

  <!-- Layer 8: Security -->
  <rect x="720" y="260" width="160" height="100" fill="#673AB7" opacity="0.9" rx="8"/>
  <text x="800" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🔒</text>
  <text x="800" y="305" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Security</text>
  <text x="800" y="325" font-size="13" font-weight="bold" text-anchor="middle" fill="white"></text>
  <text x="800" y="345" font-size="11" text-anchor="middle" fill="white">Falco, Vault</text>

  <!-- Layer 9: Storage & Data -->
  <rect x="120" y="390" width="380" height="80" fill="#4CAF50" opacity="0.85" rx="8"/>
  <text x="310" y="410" font-size="16" font-weight="bold" text-anchor="middle" fill="white">💾</text>
  <text x="310" y="435" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Persistent Storage & Data</text>
  <text x="310" y="455" font-size="11" text-anchor="middle" fill="white">StatefulSets, PVCs, Databases</text>

  <!-- Layer 10: Management & Governance -->
  <rect x="520" y="390" width="360" height="80" fill="#FF5722" opacity="0.85" rx="8"/>
  <text x="700" y="410" font-size="16" font-weight="bold" text-anchor="middle" fill="white">⚙️</text>
  <text x="700" y="435" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Management & Governance</text>
  <text x="700" y="455" font-size="11" text-anchor="middle" fill="white">RBAC, GitOps, Policy Enforcement</text>
</svg>